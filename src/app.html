<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!-- SMUI Styles -->
		<link id="smui-light" rel="stylesheet" href="/smui.css" media="(prefers-color-scheme: light)" />
		<link id="smui-dark" rel="stylesheet" href="/smui-dark.css" media="screen and (prefers-color-scheme: dark)" />
		<!-- No-flash theme init: read localStorage before first render -->
		<script>
			(function () {
				var t = localStorage.getItem('theme');
				if (t === 'dark') {
					document.documentElement.dataset.theme = 'dark';
					document.getElementById('smui-light').media = 'not all';
					document.getElementById('smui-dark').media = 'all';
				} else if (t === 'light') {
					document.documentElement.dataset.theme = 'light';
					document.getElementById('smui-light').media = 'all';
					document.getElementById('smui-dark').media = 'not all';
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
